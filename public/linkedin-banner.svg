<svg width="1584" height="396" viewBox="0 0 1584 396" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1584" height="396" fill="#0d1117"/>

  <!-- Horizontal logo lockup, centered -->
  <g transform="translate(640, 198)">
    <!-- Y-incision mark -->
    <g transform="translate(0, 0)">
      <!-- Left arm -->
      <path d="M-28,-36 Q-20,-14 0,0" stroke="#00C9A7" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- Right arm -->
      <path d="M28,-36 Q20,-14 0,0" stroke="#00C9A7" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- Vertical stem -->
      <line x1="0" y1="0" x2="0" y2="46" stroke="#00C9A7" stroke-width="6" stroke-linecap="round"/>
      <!-- Red dot -->
      <circle cx="0" cy="0" r="6" fill="#E8453C"/>
      <!-- Endpoint dots -->
      <circle cx="-28" cy="-36" r="2.5" fill="#00C9A7" opacity="0.45"/>
      <circle cx="28" cy="-36" r="2.5" fill="#00C9A7" opacity="0.45"/>
      <circle cx="0" cy="46" r="2.5" fill="#00C9A7" opacity="0.45"/>
    </g>

    <!-- Wordmark: BET (black weight) AUTOPSY (light weight) -->
    <text x="48" y="8" font-family="Inter, -apple-system, sans-serif" font-size="36" letter-spacing="3" fill="#F0F6FC">
      <tspan font-weight="900">BET</tspan><tspan font-weight="300">AUTOPSY</tspan>
    </text>
  </g>
</svg>
