<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Square background matching site bg -->
  <rect width="640" height="640" fill="#0d1117"/>

  <!-- Y-incision mark — centered, large, matching the app icon exactly -->
  <!-- Arms spread wider, thicker strokes, big red dot -->
  <g transform="translate(320, 320)">
    <!-- Left arm -->
    <path d="M-120,-140 Q-90,-60 0,0" stroke="#00C9A7" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Right arm -->
    <path d="M120,-140 Q90,-60 0,0" stroke="#00C9A7" stroke-width="28" stroke-linecap="round" fill="none"/>
    <!-- Vertical stem -->
    <line x1="0" y1="0" x2="0" y2="200" stroke="#00C9A7" stroke-width="28" stroke-linecap="round"/>
    <!-- Red dot at junction -->
    <circle cx="0" cy="0" r="26" fill="#E8453C"/>
  </g>
</svg>
