<svg width="640" height="640" viewBox="0 0 640 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="640" height="640" fill="#0d1117"/>
  <!--
    Exact proportions from IncisionMark component (logo.tsx)
    height=380, w=228, armEnd=95, sw=10, dotR=13, epR=6
    padX=15, padY=15, cx=129, cy=110, viewW=258, viewH=410
    Centered in 640x640: offset (191, 115)
  -->
  <g transform="translate(191, 115)">
    <!-- Left arm: M padX,padY Q padX+w*0.15,padY+armEnd*0.5 cx,cy -->
    <path d="M15,15 Q49.2,62.5 129,110" stroke="#00FFCB" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Right arm: M viewW-padX,padY Q viewW-padX-w*0.15,padY+armEnd*0.5 cx,cy -->
    <path d="M243,15 Q208.8,62.5 129,110" stroke="#00FFCB" stroke-width="10" stroke-linecap="round" fill="none"/>
    <!-- Stem: cx,cy to cx,viewH-padY -->
    <line x1="129" y1="110" x2="129" y2="395" stroke="#00FFCB" stroke-width="10" stroke-linecap="round"/>
    <!-- Junction dot -->
    <circle cx="129" cy="110" r="13" fill="#E8453C"/>
    <!-- Endpoint dots -->
    <circle cx="15" cy="15" r="6" fill="#00FFCB" opacity="0.45"/>
    <circle cx="243" cy="15" r="6" fill="#00FFCB" opacity="0.45"/>
    <circle cx="129" cy="395" r="6" fill="#00FFCB" opacity="0.45"/>
  </g>
</svg>
